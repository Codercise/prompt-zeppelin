name: PromptZeppelin
options:
  bundleIdPrefix: com.promptzeppelin
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
targets:
  PromptZeppelin:
    type: application
    platform: macOS
    sources:
      - PromptZeppelin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.promptzeppelin.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
